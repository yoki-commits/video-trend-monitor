<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}视频数据趋势监测{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="/" class="nav-logo">视频趋势监测</a>
            <div class="nav-links">
                <a href="/">概览</a>
                <a href="/upload">上传数据</a>
            </div>
        </div>
    </nav>
    <main class="main">
        {% block content %}{% endblock %}
    </main>

    <div id="deleteModal" class="modal-overlay" style="display:none;">
        <div class="modal-dialog">
            <div class="modal-title">确认删除</div>
            <div class="modal-body" id="deleteModalBody"></div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeDeleteModal()">取消</button>
                <button class="btn btn-danger" id="confirmDeleteBtn">确认删除</button>
            </div>
        </div>
    </div>

    <script>
    var _deleteModalCallback = null;

    function showDeleteModal(message, callback) {
        document.getElementById('deleteModalBody').innerHTML = message;
        _deleteModalCallback = callback;
        document.getElementById('deleteModal').style.display = 'flex';
    }

    function closeDeleteModal() {
        document.getElementById('deleteModal').style.display = 'none';
        _deleteModalCallback = null;
    }

    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('confirmDeleteBtn').addEventListener('click', function() {
            var cb = _deleteModalCallback;
            closeDeleteModal();
            if (cb) cb();
        });
    });
    </script>
</body>
</html>
