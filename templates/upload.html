{% extends "base.html" %}
{% block title %}上传数据 - 视频趋势监测{% endblock %}
{% block content %}
<div class="upload-page">
    <h1>上传新视频数据</h1>
    <div id="alert" class="alert"></div>
    <form id="uploadForm">
        <div class="form-group">
            <label for="publish_date">发布日期</label>
            <input type="date" id="publish_date" name="publish_date" required>
        </div>
        <div class="form-group">
            <label for="topic">视频主题</label>
            <input type="text" id="topic" name="topic" placeholder="如：Vlog#1 露营记" required>
        </div>
        <div class="form-group">
            <label for="files">数据文件 (.xlsx)</label>
            <input type="file" id="files" name="files" accept=".xlsx" multiple required>
            <div class="form-hint">一次选择两个文件（流量数据 + 粉丝数据），系统自动识别</div>
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="padding:12px;font-size:15px;">提交并分析</button>
    </form>
</div>

<script>
document.getElementById('uploadForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const alert = document.getElementById('alert');
    alert.className = 'alert';
    alert.style.display = 'none';

    const fileInput = document.getElementById('files');
    if (fileInput.files.length !== 2) {
        alert.className = 'alert alert-error';
        alert.textContent = '请恰好选择两个 .xlsx 文件（流量数据 + 粉丝数据）';
        alert.style.display = 'block';
        return;
    }

    const formData = new FormData(this);

    try {
        const res = await fetch('/api/upload', { method: 'POST', body: formData });
        const data = await res.json();
        if (data.success) {
            alert.className = 'alert alert-success';
            alert.textContent = data.topic + ' 上传成功，正在跳转...';
            alert.style.display = 'block';
            setTimeout(() => { window.location.href = '/video/' + data.video_id; }, 1500);
        } else {
            alert.className = 'alert alert-error';
            alert.textContent = data.error || '上传失败';
            alert.style.display = 'block';
        }
    } catch (err) {
        alert.className = 'alert alert-error';
        alert.textContent = '网络错误，请重试';
        alert.style.display = 'block';
    }
});
</script>
{% endblock %}
